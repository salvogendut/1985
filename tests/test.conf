# Headless test config for drive-B write investigation.
# PCW 8512 → drive A + drive B both wired. FDC trace on.

[machine]
model = 8512
memory_kb = 512
region = pal

[storage]
drive_a =
drive_b =

[display]
scale = 2
fullscreen = false
fullscreen_smoothing = false
monochrome = green

[extensions]
ext_second_drive        = true
ext_sanpollo_backplane  = false
ext_serial              = false
ext_perryfi             = false
ext_dktronics           = false
input_device            = joystick
ext_pdf_printer         = false

[advanced]
tinker = true
debug = true
debug_traces = true
trace_io = false
trace_fdc = true
trace_input = false
mouse_type = amx
joystick_type = dksound
