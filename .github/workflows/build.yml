name: build

on:
  push:
    branches: [main]
    tags:     ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (Fedora)
    runs-on: ubuntu-latest
    container: fedora:41
    steps:
      - name: Install build deps
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            gcc make autoconf automake pkgconf-pkg-config \
            SDL3-devel cairo-devel git \
            rpm-build rpmdevtools \
            desktop-file-utils libappstream-glib systemd-rpm-macros
      - uses: actions/checkout@v4
      - name: Mark workspace as a safe git dir
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Configure
        run: |
          autoreconf -iv
          ./configure
      - name: Build
        run: make -j$(nproc)
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: 1985-linux-x86_64
          path: 1985
      - name: Build RPM
        run: |
          set -e
          rpmdev-setuptree
          # `make dist` produces 1985-<version>.tar.gz that the spec
          # expects under Source0.
          make dist
          cp 1985-*.tar.gz ~/rpmbuild/SOURCES/
          cp 1985.spec     ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/1985.spec
          mkdir -p rpm-out
          find ~/rpmbuild/RPMS -name '1985-*.rpm' -exec cp {} rpm-out/ \;
          ls -la rpm-out/
      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: 1985-fedora-x86_64-rpm
          path: rpm-out/*.rpm

  windows:
    name: Windows (MinGW)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSYS2 + MinGW + SDL3
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-sdl3
            autoconf
            automake
      - name: Configure
        # The Cairo PDF-printer backend pulls in a large stack of
        # transitive DLLs on MinGW (pixman, freetype, fontconfig,
        # libpng, harfbuzz, ...) which inflates the Windows bundle a
        # lot. Build without it for the binary release; the printer
        # ports still report "ready" to the guest and the LED still
        # blinks, but bytes don't get captured to a host PDF.
        run: |
          autoreconf -iv
          ./configure --without-cairo
      - name: Build
        run: make -j$(nproc)
      - name: Stage binary + DLLs
        run: |
          mkdir dist
          cp 1985.exe dist/
          # Bundle the MinGW runtime + SDL3 DLLs the .exe needs
          # to run on a stock Windows host.
          for dll in $(ldd dist/1985.exe | awk '/mingw64/ {print $3}'); do
            cp "$dll" dist/
          done
          cp -r roms dist/
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: 1985-windows-x86_64
          path: dist/

  flatpak:
    name: Flatpak (x86_64)
    # Slow (~15 min); skip on PRs (the manifest builds branch:main, so a PR
    # build wouldn't reflect the PR anyway). Runs on main, tags, and manual
    # dispatch. The Linux job already covers PR compile breakage.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: 1985.flatpak
          manifest-path: io.github.salvogendut.Emulator1985.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: 1985-flatpak-x86_64
          path: 1985.flatpak

  release:
    name: Publish GitHub Release
    needs: [linux, windows, flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package release assets
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          mkdir -p assets

          # Linux: rename the bare ELF so it does not collide with the tag name
          cp artifacts/1985-linux-x86_64/1985 "assets/1985-${tag}-linux-x86_64"
          chmod +x "assets/1985-${tag}-linux-x86_64"

          # Fedora RPM (single .x86_64.rpm produced from the spec)
          cp artifacts/1985-fedora-x86_64-rpm/*.rpm assets/

          # Windows: zip the full bundle (exe + DLLs + roms)
          (cd artifacts/1985-windows-x86_64 && zip -r "../../assets/1985-${tag}-windows-x86_64.zip" .)

          # Flatpak: single-file bundle, installable with `flatpak install`
          cp artifacts/1985-flatpak-x86_64/1985.flatpak "assets/1985-${tag}-x86_64.flatpak"

          ls -la assets/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
