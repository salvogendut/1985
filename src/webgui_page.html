<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>1985 — Amstrad PCW</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #101014; color: #d8d8e0;
    font: 14px/1.45 system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; padding: 12px; min-height: 100vh;
  }
  header { display: flex; align-items: center; gap: 10px; }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
  #dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #d33; transition: background .3s;
  }
  #dot.live { background: #3c3; }
  #screenwrap {
    outline: none; border: 2px solid #333; border-radius: 4px;
    position: relative; max-width: 100%;
  }
  #screenwrap:focus { border-color: #3c3; }
  #screen {
    display: block; width: min(90vw, 768px); aspect-ratio: 4 / 3;
    image-rendering: pixelated; background: #000;
  }
  #kbhint {
    position: absolute; left: 0; right: 0; bottom: 0;
    text-align: center; padding: 3px; font-size: 12px;
    background: rgba(0,0,0,.65); color: #aaa; pointer-events: none;
  }
  #kbhint.live { color: #6d6; }
  #controls {
    display: flex; flex-wrap: wrap; gap: 24px;
    align-items: flex-start; justify-content: center;
  }
  fieldset {
    border: 1px solid #333; border-radius: 6px; padding: 10px 12px;
  }
  legend { padding: 0 6px; color: #888; font-size: 12px; }
  #actions button, #pastebox button, #audiobox button {
    background: #26262e; color: #d8d8e0; border: 1px solid #444;
    border-radius: 6px; font-size: 16px; cursor: pointer;
    touch-action: none; user-select: none; -webkit-user-select: none;
  }
  #pastebox { display: flex; flex-direction: column; gap: 8px; }
  #pastetext {
    width: 260px; height: 84px; resize: vertical;
    background: #16161c; color: #d8d8e0;
    border: 1px solid #444; border-radius: 4px; padding: 6px;
    font: 13px monospace;
  }
  #pastebox button, #actions button, #diskbox button, #sessionbox button, #audiobox button { padding: 8px 14px; font-size: 14px; }
  #actions { display: flex; flex-direction: column; gap: 8px; }
  #reset { border-color: #a44; }
  #audiobox { display: flex; flex-direction: column; gap: 8px; width: 200px; }
  #audiobox button {
    background: #26262e; color: #d8d8e0; border: 1px solid #444;
    border-radius: 6px; cursor: pointer; flex: 1;
  }
  #audiostatus { color: #888; font-size: 12px; min-height: 1em; }
  #diskbox { display: flex; flex-direction: column; gap: 8px; width: 200px; }
  .diskrow { display: flex; gap: 6px; align-items: center; }
  .diskrow span { width: 14px; color: #888; }
  .diskrow button, #sessionbox button {
    background: #26262e; color: #d8d8e0; border: 1px solid #444;
    border-radius: 6px; cursor: pointer; flex: 1;
  }
  #diskstatus, #sessioncfgstatus { color: #888; font-size: 12px; min-height: 1em; }
  #sessionbox { display: flex; flex-direction: column; gap: 8px; width: 200px; }
  footer { color: #555; font-size: 12px; }
</style>
</head>
<body>
<header>
  <span id="dot"></span>
  <h1>1985 — Amstrad PCW</h1>
</header>

<div id="screenwrap" tabindex="0">
  <img id="screen" src="/stream" alt="PCW screen">
  <div id="kbhint">click the screen to capture keyboard &amp; mouse</div>
</div>

<div id="controls">
  <fieldset id="pastebox">
    <legend>Paste text</legend>
    <textarea id="pastetext" placeholder="DIR" spellcheck="false"></textarea>
    <button id="pastebtn">Paste to PCW</button>
  </fieldset>

  <fieldset id="diskbox" style="display:none">
    <legend>Disks</legend>
    <div class="diskrow">
      <span>A:</span>
      <button data-drive="0">Load .dsk…</button>
    </div>
    <div class="diskrow">
      <span>B:</span>
      <button data-drive="1">Load .dsk…</button>
    </div>
    <div id="diskstatus"></div>
    <input type="file" id="diskfile" accept=".dsk" style="display:none">
  </fieldset>

  <fieldset id="sessionbox" style="display:none">
    <legend>Session</legend>
    <button id="sessioncfgbtn">Load session config…</button>
    <div id="sessioncfgstatus"></div>
    <input type="file" id="sessioncfgfile" accept=".conf,.txt" style="display:none">
  </fieldset>

  <fieldset id="audiobox">
    <legend>Audio</legend>
    <button id="audiobtn">Start audio</button>
    <div id="audiostatus">off</div>
    <audio id="audio" preload="none"></audio>
  </fieldset>

  <fieldset>
    <legend>Machine</legend>
    <div id="actions">
      <button id="reset">Reset (F5)</button>
    </div>
  </fieldset>
</div>

<footer>1985 Web GUI — everyone on this network can view and control the emulator.
Esc also drops mouse capture (browser rule); click the screen to recapture.</footer>

<script>
"use strict";

function post(url) { fetch(url, { method: "POST" }).catch(function () {}); }

/* --- keyboard: KeyboardEvent.code -> SDL scancode name --- */
var KEYMAP = {
  Enter: "Return", NumpadEnter: "Keypad Enter",
  ShiftLeft: "Left Shift", ShiftRight: "Right Shift",
  ControlLeft: "Left Ctrl", ControlRight: "Right Ctrl",
  ArrowUp: "Up", ArrowDown: "Down", ArrowLeft: "Left", ArrowRight: "Right",
  Backspace: "Backspace", Tab: "Tab", Escape: "Escape", Space: "Space",
  CapsLock: "CapsLock", Delete: "Delete",
  Minus: "-", Equal: "=", BracketLeft: "[", BracketRight: "]",
  Semicolon: ";", Quote: "'", Backquote: "`", Backslash: "\\",
  Comma: ",", Period: ".", Slash: "/"
};
function sdlName(code) {
  if (KEYMAP[code]) return KEYMAP[code];
  var m;
  if ((m = code.match(/^Key([A-Z])$/))) return m[1];
  if ((m = code.match(/^Digit([0-9])$/))) return m[1];
  if ((m = code.match(/^Numpad([0-9])$/))) return "Keypad " + m[1];
  if (/^F([1-9]|1[0-2])$/.test(code)) return code;
  return null;
}

/* --- input capture: click the screen to own keyboard + mouse, ---
 * --- Ctrl+Enter to release (same combo as the emulator window) --- */
var wrap = document.getElementById("screenwrap");
var hint = document.getElementById("kbhint");
var held = new Set();
var hasMouse = false;      /* does the CPC have a pointer device? */
var mheld = new Set();     /* mouse buttons currently down */

fetch("/status").then(function (r) { return r.json(); })
  .then(function (s) {
    hasMouse = !!s.mouse;
    updateHint();
    if (s.sessions) {
      document.getElementById("diskbox").style.display = "";
      document.getElementById("sessionbox").style.display = "";
    }
  })
  .catch(function () {});

function sendKey(name, down, shift) {
  post("/key?c=" + encodeURIComponent(name) + "&d=" + (down ? 1 : 0) +
       (shift ? "&m=1" : ""));
}
function captured() { return document.activeElement === wrap; }
function mouseLocked() { return document.pointerLockElement === wrap; }

function updateHint() {
  if (captured()) {
    hint.classList.add("live");
    hint.textContent = mouseLocked()
      ? "keyboard + mouse captured — Ctrl+Enter releases"
      : (hasMouse ? "keyboard captured — click again for mouse, Ctrl+Enter releases"
                  : "keyboard captured — Ctrl+Enter releases");
  } else {
    hint.classList.remove("live");
    hint.textContent = hasMouse
      ? "click the screen to capture keyboard & mouse"
      : "click the screen to capture your keyboard";
  }
}

function releaseAll() {
  held.forEach(function (name) { sendKey(name, false, false); });
  held.clear();
  mheld.forEach(function (b) { post("/mouse?b=" + b + "&d=0"); });
  mheld.clear();
}
function releaseCapture() {
  if (mouseLocked()) document.exitPointerLock();
  releaseAll();
  wrap.blur();
  updateHint();
}

wrap.addEventListener("click", function () {
  wrap.focus();
  if (hasMouse && !mouseLocked()) wrap.requestPointerLock();
  updateHint();
});

wrap.addEventListener("keydown", function (e) {
  /* Ctrl+Enter releases capture — never forwarded to the CPC. */
  if (e.ctrlKey && e.code === "Enter") {
    e.preventDefault();
    releaseCapture();
    return;
  }
  var name = sdlName(e.code);
  if (!name) return;
  e.preventDefault();
  if (e.repeat || held.has(name)) return;   /* the PCW does its own auto-repeat */
  held.add(name);
  sendKey(name, true, e.shiftKey);
});
wrap.addEventListener("keyup", function (e) {
  var name = sdlName(e.code);
  if (!name) return;
  e.preventDefault();
  held.delete(name);
  sendKey(name, false, e.shiftKey);
});
window.addEventListener("blur", releaseAll);
document.addEventListener("visibilitychange", function () {
  if (document.hidden) releaseAll();
});

/* --- mouse: pointer-locked relative motion -> /mouse --- */
var mdx = 0, mdy = 0;
document.addEventListener("pointerlockchange", updateHint);
wrap.addEventListener("mousemove", function (e) {
  if (!mouseLocked()) return;
  mdx += e.movementX;
  mdy += e.movementY;
});
setInterval(function () {              /* flush motion at ~30 Hz */
  if (!mouseLocked() || (!mdx && !mdy)) return;
  var dx = Math.max(-1024, Math.min(1024, Math.round(mdx)));
  var dy = Math.max(-1024, Math.min(1024, Math.round(mdy)));
  mdx = mdy = 0;
  post("/mouse?dx=" + dx + "&dy=" + dy);
}, 33);
function pcwBtn(b) {                   /* browser 0/1/2 = L/M/R, same as PCW */
  return (b >= 0 && b <= 2) ? b : -1;
}
wrap.addEventListener("mousedown", function (e) {
  if (!mouseLocked()) return;
  e.preventDefault();
  var b = pcwBtn(e.button);
  if (b < 0) return;
  mheld.add(b);
  post("/mouse?b=" + b + "&d=1");
});
wrap.addEventListener("mouseup", function (e) {
  if (!mouseLocked()) return;
  e.preventDefault();
  var b = pcwBtn(e.button);
  if (b < 0) return;
  mheld.delete(b);
  post("/mouse?b=" + b + "&d=0");
});
wrap.addEventListener("contextmenu", function (e) {
  if (mouseLocked() || captured()) e.preventDefault();
});

/* --- paste + reset --- */
document.getElementById("pastebtn").addEventListener("click", function () {
  var text = document.getElementById("pastetext").value;
  if (!text) return;
  fetch("/paste", { method: "POST", body: text }).catch(function () {});
  wrap.focus();
});
document.getElementById("reset").addEventListener("click", function () {
  if (confirm("Reset the PCW?")) post("/reset");
});

/* --- audio: browser policies require a user gesture before playback --- */
var audio = document.getElementById("audio");
var audiobtn = document.getElementById("audiobtn");
var audiostatus = document.getElementById("audiostatus");
var audioOn = false;

function stopAudio() {
  audio.pause();
  audio.removeAttribute("src");
  audio.load();
  audioOn = false;
  audiobtn.textContent = "Start audio";
  audiostatus.textContent = "off";
}

audiobtn.addEventListener("click", function () {
  if (audioOn) {
    stopAudio();
    return;
  }
  audiostatus.textContent = "buffering...";
  audio.src = "/audio?" + Date.now();
  audio.play().then(function () {
    audioOn = true;
    audiobtn.textContent = "Stop audio";
    audiostatus.textContent = "playing";
    wrap.focus();
  }).catch(function () {
    stopAudio();
    audiostatus.textContent = "blocked by browser";
  });
});
audio.addEventListener("error", function () {
  if (audioOn) stopAudio();
  audiostatus.textContent = "connection lost";
});

/* --- disk load: hidden file input, one per drive button --- */
var diskfile = document.getElementById("diskfile");
var diskstatus = document.getElementById("diskstatus");
var diskDrive = 0;
document.querySelectorAll("#diskbox button[data-drive]").forEach(function (btn) {
  btn.addEventListener("click", function () {
    diskDrive = btn.dataset.drive;
    diskfile.value = "";
    diskfile.click();
  });
});
diskfile.addEventListener("change", function () {
  var file = diskfile.files[0];
  if (!file) return;
  var letter = diskDrive === "0" ? "A" : "B";
  diskstatus.textContent = "loading " + file.name + " into drive " + letter + "…";
  fetch("/disk?drive=" + diskDrive + "&name=" + encodeURIComponent(file.name), {
    method: "POST", body: file
  }).then(function (r) {
    diskstatus.textContent = r.ok
      ? file.name + " mounted in drive " + letter
      : "failed to mount " + file.name + " (" + r.status + ")";
  }).catch(function () {
    diskstatus.textContent = "upload failed (connection lost)";
  });
});

/* --- session config upload (Web Service / --web only) --- */
var sessioncfgfile = document.getElementById("sessioncfgfile");
var sessioncfgstatus = document.getElementById("sessioncfgstatus");
document.getElementById("sessioncfgbtn").addEventListener("click", function () {
  sessioncfgfile.value = "";
  sessioncfgfile.click();
});
sessioncfgfile.addEventListener("change", function () {
  var file = sessioncfgfile.files[0];
  if (!file) return;
  sessioncfgstatus.textContent = "applying " + file.name + "…";
  fetch("/session/config", { method: "POST", body: file }).then(function (r) {
    sessioncfgstatus.textContent = r.ok
      ? file.name + " applied — this session rebooted"
      : "failed to apply " + file.name + " (" + r.status + ")";
  }).catch(function () {
    sessioncfgstatus.textContent = "upload failed (connection lost)";
  });
});

/* --- stream status + auto-reconnect --- */
var img = document.getElementById("screen");
var dot = document.getElementById("dot");
img.addEventListener("load", function () { dot.classList.add("live"); });
img.addEventListener("error", function () {
  dot.classList.remove("live");
  setTimeout(function () { img.src = "/stream?" + Date.now(); }, 1000);
});
</script>
</body>
</html>
