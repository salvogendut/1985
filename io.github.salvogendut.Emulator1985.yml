app-id: io.github.salvogendut.Emulator1985
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk//24.08
# Quoted so flatpak-builder parses it as a string, not the integer 1985.
command: '1985'

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --device=all
  - --filesystem=home

modules:
  - name: sdl3
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSDL_SHARED=ON
      - -DSDL_STATIC=OFF
      - -DSDL_TEST_LIBRARY=OFF
      - -DSDL_TESTS=OFF
      - -DSDL_EXAMPLES=OFF
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL/archive/refs/tags/release-3.4.10.tar.gz
        sha256: 0dc11d980ba17250200718fa4e28011da293f27ed92f92203afffe396811f307
    cleanup:
      - /bin
      - /include
      - /lib/cmake
      - /lib/pkgconfig
      - /share/aclocal
      - '*.la'

  - name: emulator-1985
    buildsystem: simple
    build-commands:
      - autoreconf -fi
      - ./configure --prefix=/app
      - make -j$(nproc)
      - make install
    sources:
      - type: git
        url: https://github.com/salvogendut/1985.git
        branch: main
